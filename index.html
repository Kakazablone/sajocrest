<!DOCTYPE html>
<html style="background-color: #ffffff;">
<head>
  <title>SaJocrest</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="logo.png">
  
  <meta name="theme-color" content="#ffffff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">

  <style>
    body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: -apple-system, sans-serif; }

    /* STAGE 1: THE WHITE SPLASH (Matches Manifest) */
    #white-splash {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #ffffff;
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
      transition: opacity 1s cubic-bezier(0.4, 0, 0.2, 1);
    }
    #white-splash img {
      width: 180px; /* Same size as it appears on the phone splash */
      height: auto;
    }

    /* STAGE 2: THE GRADIENT & TEXT ANIMATION */
    #gradient-loader {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(135deg, #2c3e50, #18bc9c) fixed;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 50; text-align: center; color: white;
      transition: opacity 1.2s ease-in-out;
    }
    .taglines { 
      font-size: 12px; letter-spacing: 4px; text-transform: uppercase; 
      color: rgba(255,255,255,0.7); margin-bottom: 10px;
      animation: fadeInUp 1s ease-out forwards;
    }
    .brand { 
      font-size: 32px; font-weight: 800; 
      animation: fadeInUp 1.2s ease-out forwards;
    }
    .accent { color: white; font-weight: 300; }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* STAGE 3: THE SCRIPT IFRAME */
    iframe { 
      position: absolute; top: 0; left: 0; border: none; width: 100vw; height: 100vh; 
      z-index: 10; opacity: 0;
      transition: opacity 1.5s ease;
    }
    iframe.active { opacity: 1; }

    /* Helper class to trigger transitions */
    .hidden { opacity: 0 !important; pointer-events: none; }
  </style>
</head>
<body>

  <!-- LAYER 1: Pure White with Logo (Matches Manifest) -->
  <div id="white-splash">
    <img src="logo.png" alt="SaJocrest">
  </div>

  <!-- LAYER 2: Gradient Branding -->
  <div id="gradient-loader">
    <div class="taglines">Kennel • Poultry • Livestock</div>
    <div class="brand">SaJocrest <span class="accent">Agrofarm</span></div>
  </div>

  <!-- LAYER 3: Google Script -->
  <iframe id="appFrame"></iframe>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby_yNQZgUF4ID6ZVVWFEbvKzFCOiM-6L8UREb6qgHX6DwLQPsxoCYovfsCOpaV22k3ODA/exec";
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;

    function init() {
      const splash = document.getElementById('white-splash');
      const loader = document.getElementById('gradient-loader');
      const frame = document.getElementById('appFrame');

      // 1. Hold the white splash for 1.2 seconds to feel intentional
      setTimeout(() => {
        splash.classList.add('hidden'); // Smoothly fade into the Gradient
        
        if (isIOS) {
          // iOS: Handle redirect after branding animation
          setTimeout(() => {
            window.location.replace(SCRIPT_URL);
          }, 3000);
        } else {
          // Android: Load iframe in background
          frame.src = SCRIPT_URL;
          frame.onload = function() {
            // Once the script is loaded, cross-fade from Gradient to Script
            setTimeout(() => {
              loader.classList.add('hidden');
              frame.classList.add('active');
            }, 1500);
          };
        }
      }, 1200); 
    }

    window.addEventListener('load', init);
  </script>
</body>
</html>
