<!DOCTYPE html>
<html>
<head>
  <title>SaJocrest</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.png">
  
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <style>
    /* 1. INSTANT GRADIENT BACKGROUND */
    body, html { 
      margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; 
      background: #2c3e50; /* Fallback color */
      background: linear-gradient(135deg, #2c3e50, #18bc9c); 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    
    /* 2. INSTANT LOADER (No Bootstrap needed for the look) */
    #wrapper-loader {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 99999; color: white; transition: opacity 0.4s ease;
    }

    /* CSS-only spinner so we don't wait for Bootstrap to load */
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid rgba(255,255,255,0.2);
      border-left-color: #18bc9c;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 15px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .sync-text { font-weight: bold; letter-spacing: 1px; font-size: 14px; }

    iframe { border: none; width: 100vw; height: 100vh; opacity: 0; transition: opacity 0.5s ease; }
    iframe.loaded { opacity: 1; }
  </style>
</head>
<body>

  <div id="wrapper-loader">
    <div class="spinner"></div>
    <div class="sync-text">SYNCING...</div>
  </div>

  <iframe id="appFrame" src="https://script.google.com/macros/s/YOUR_SCRIPT_ID/exec" onload="hideWrapperLoader()"></iframe>

  <script>
    function hideWrapperLoader() {
      const loader = document.getElementById('wrapper-loader');
      const frame = document.getElementById('appFrame');
      
      // Small delay to ensure Google Script is fully rendered
      setTimeout(() => {
        loader.style.opacity = '0';
        frame.classList.add('loaded');
        setTimeout(() => { loader.style.display = 'none'; }, 500);
      }, 700);
    }
  </script>
</body>
</html>
