<!DOCTYPE html>
<!-- This background-color matches the manifest exactly to prevent the "Flash" -->
<html style="background-color: #2c3e50;">
<head>
  <title>SaJocrest</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.png">
  
  <meta name="theme-color" content="#2c3e50">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <style>
    body, html { 
      margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden;
      /* Your gradient is here and stays here */
      background: linear-gradient(135deg, #2c3e50, #18bc9c) fixed;
      color: white; font-family: -apple-system, sans-serif;
    }
    
    #wrapper-loader {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 99999; text-align: center; 
      /* This makes your text/brand fade in smoothly AFTER the wake-up */
      animation: fadeInText 1s ease-in forwards;
    }

    @keyframes fadeInText {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .taglines { font-size: 12px; letter-spacing: 4px; text-transform: uppercase; color: rgba(255,255,255,0.7); margin-bottom: 10px; }
    .brand { font-size: 32px; font-weight: 800; }
    .accent { color: white; font-weight: 300; }

    iframe { 
      border: none; width: 100vw; height: 100vh; 
      display: none; opacity: 0; transition: opacity 0.8s ease; 
    }
    iframe.active { display: block; opacity: 1; }
  </style>
</head>
<body>

  <div id="wrapper-loader">
    <div class="taglines">Kennel • Poultry • Livestock</div>
    <div class="brand">SaJocrest <span class="accent">Agrofarm</span></div>
  </div>

  <iframe id="appFrame"></iframe>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby_yNQZgUF4ID6ZVVWFEbvKzFCOiM-6L8UREb6qgHX6DwLQPsxoCYovfsCOpaV22k3ODA/exec";
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;

    function init() {
      const frame = document.getElementById('appFrame');
      const loader = document.getElementById('wrapper-loader');

      if (isIOS) {
        setTimeout(() => { window.location.replace(SCRIPT_URL); }, 1500);
      } else {
        frame.src = SCRIPT_URL;
        frame.onload = function() {
          setTimeout(() => {
            loader.style.opacity = '0';
            frame.classList.add('active');
            setTimeout(() => { loader.style.display = 'none'; }, 600);
          }, 1000);
        };
      }
    }
    init();
  </script>
</body>
</html>
