<!DOCTYPE html>
<html>
<head>
  <title>SaJocrest</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.png">
  
  <!-- Bootstrap for your specific loader classes -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #000; }
    
    /* YOUR EXACT LOADER CSS */
    #wrapper-loader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8); /* Matching your dark semi-transparent bg */
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 99999;
      color: white;
    }

    iframe { 
      border: none; 
      width: 100vw; 
      height: 100vh; 
      opacity: 0; 
      transition: opacity 0.4s ease; 
    }
    
    iframe.loaded { opacity: 1; }
  </style>
</head>
<body>

  <!-- THE LOADER (Identical to your script) -->
  <div id="wrapper-loader">
    <div class="spinner-border text-success mb-2"></div>
    <span class="fw-bold">SYNCING...</span>
  </div>

  <!-- THE APP -->
  <iframe id="appFrame" src=https://script.google.com/macros/s/AKfycbyTxniB_1z4QNgihsJin8Ko42OIcUbY1UAL6RpdtJKX-nKeTAoelRBR6bp605xO5iRHig/exec onload="hideWrapperLoader()"></iframe>

  <script>
    function hideWrapperLoader() {
      // The iframe has finished loading the Google Script shell
      const loader = document.getElementById('wrapper-loader');
      const frame = document.getElementById('appFrame');
      
      // Smooth transition
      loader.style.opacity = '0';
      frame.classList.add('loaded');
      
      setTimeout(() => {
        loader.style.display = 'none';
      }, 500);
    }
  </script>
</body>
</html>
