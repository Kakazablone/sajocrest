<!DOCTYPE html>
<html style="background-color: #ffffff;">
<head>
  <title>SaJocrest</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="logo.png">
  
  <meta name="theme-color" content="#ffffff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">

  <style>
    body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: -apple-system, sans-serif; background: #ffffff; }

    /* STAGE 1: THE WHITE SPLASH */
    #white-splash {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #ffffff;
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
      transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    #white-splash img { width: 180px; height: auto; }

    /* STAGE 2: THE GRADIENT & FLOATING TAGLINES */
    #gradient-loader {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(135deg, #2c3e50, #18bc9c) fixed;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 50; transition: opacity 1.5s ease-in-out;
    }

    .tagline-container { text-align: center; color: white; }

    .tag {
      display: block;
      font-size: 14px;
      letter-spacing: 6px;
      text-transform: uppercase;
      margin: 20px 0;
      opacity: 0;
      font-weight: 300;
      /* Animation for entry */
      animation: revealAndFloat 4s ease-in-out infinite;
    }

    /* Staggered Delays for the "One by One" effect */
    .tag:nth-child(1) { animation-delay: 0.2s; }
    .tag:nth-child(2) { animation-delay: 0.8s; }
    .tag:nth-child(3) { animation-delay: 1.4s; }

    @keyframes revealAndFloat {
      0% { opacity: 0; transform: translateY(20px) scale(0.9); filter: blur(5px); }
      20% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0px); }
      50% { transform: translateY(-15px); opacity: 0.8; }
      100% { transform: translateY(0px); opacity: 1; }
    }

    /* STAGE 3: THE SCRIPT IFRAME */
    iframe { 
      position: absolute; top: 0; left: 0; border: none; width: 100vw; height: 100vh; 
      z-index: 10; opacity: 0; transform: scale(1.02);
      transition: opacity 1.5s ease, transform 1.5s cubic-bezier(0.16, 1, 0.3, 1);
    }
    iframe.active { opacity: 1; transform: scale(1); }

    .hidden { opacity: 0 !important; pointer-events: none; }
  </style>
</head>
<body>

  <!-- LAYER 1: White background with Logo -->
  <div id="white-splash">
    <img src="logo.png" alt="SaJocrest">
  </div>

  <!-- LAYER 2: Gradient with Floating Taglines -->
  <div id="gradient-loader">
    <div class="tagline-container">
      <span class="tag">Kennel</span>
      <span class="tag">Poultry</span>
      <span class="tag">Livestock</span>
    </div>
  </div>

  <!-- LAYER 3: Google Script Content -->
  <iframe id="appFrame"></iframe>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby_yNQZgUF4ID6ZVVWFEbvKzFCOiM-6L8UREb6qgHX6DwLQPsxoCYovfsCOpaV22k3ODA/exec";
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;

    function init() {
      const splash = document.getElementById('white-splash');
      const loader = document.getElementById('gradient-loader');
      const frame = document.getElementById('appFrame');

      // 1. Fade the white logo splash into the gradient after 1.5 seconds
      setTimeout(() => {
        splash.classList.add('hidden');
        
        if (isIOS) {
          // iOS needs a direct redirect - we wait for the tagline animation to play out
          setTimeout(() => {
            window.location.replace(SCRIPT_URL);
          }, 4500);
        } else {
          // Android: Start loading the script in the background
          frame.src = SCRIPT_URL;
          frame.onload = function() {
            // Give the taglines time to float (minimum 3.5 seconds total)
            setTimeout(() => {
              loader.classList.add('hidden');
              frame.classList.add('active');
            }, 3000);
          };
        }
      }, 1500); 
    }

    window.addEventListener('load', init);
  </script>
</body>
</html>
