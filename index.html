<!DOCTYPE html>
<html>
<head>
  <title>SaJocrest</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.png">
  
  <!-- Bootstrap for the loader -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    /* THE TRICK: Apply the gradient to the whole page background */
    body, html { 
      margin: 0; 
      padding: 0; 
      height: 100%; 
      width: 100%; 
      overflow: hidden; 
      background: linear-gradient(135deg, #2c3e50, #18bc9c); 
    }
    
    #wrapper-loader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      /* Background is transparent because the body has the gradient */
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 99999;
      color: white;
      transition: opacity 0.4s ease;
    }

    iframe { 
      border: none; 
      width: 100vw; 
      height: 100vh; 
      opacity: 0; 
      transition: opacity 0.5s ease;
      background: transparent; /* Allows gradient to show through if script is transparent */
    }
    
    iframe.loaded { opacity: 1; }
  </style>
</head>
<body>

  <div id="wrapper-loader">
    <div class="spinner-border text-success mb-2"></div>
    <span class="fw-bold">SYNCING...</span>
  </div>

  <!-- Replace YOUR_SCRIPT_ID with your actual Script URL -->
  <iframe id="appFrame" src="https://script.google.com/macros/s/YOUR_SCRIPT_ID/exec" onload="hideWrapperLoader()"></iframe>

  <script>
    function hideWrapperLoader() {
      const loader = document.getElementById('wrapper-loader');
      const frame = document.getElementById('appFrame');
      
      // We wait a tiny bit extra (800ms) to ensure the Google Auth redirect 
      // inside the iframe has finished its "white flicker" phase
      setTimeout(() => {
        loader.style.opacity = '0';
        frame.classList.add('loaded');
        
        setTimeout(() => {
          loader.style.display = 'none';
        }, 500);
      }, 800);
    }
  </script>
</body>
</html>
