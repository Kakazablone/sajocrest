<!DOCTYPE html>
<html style="background: #2c3e50;">
<head>
  <title>SaJocrest</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <link rel="manifest" href="manifest.json?v=11">
  <link rel="apple-touch-icon" href="icon.png">
  
  <meta name="theme-color" content="#2c3e50">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <style>
    body, html { 
      margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden;
      background: linear-gradient(135deg, #2c3e50, #18bc9c) fixed;
      color: white; font-family: -apple-system, sans-serif;
    }
    
    #wrapper-loader {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 99999; text-align: center; transition: opacity 0.8s ease;
    }

    .taglines { font-size: 12px; letter-spacing: 4px; text-transform: uppercase; color: rgba(255,255,255,0.7); margin-bottom: 10px; }
    .brand { font-size: 32px; font-weight: 800; }
    .accent { color: white; font-weight: 300; }

    /* Hide iframe by default */
    iframe { 
      border: none; width: 100vw; height: 100vh; 
      display: none; opacity: 0; transition: opacity 1s ease; 
    }
    iframe.active { display: block; opacity: 1; }
  </style>
</head>
<body>

  <div id="wrapper-loader">
    <div class="taglines">Kennel • Poultry • Livestock</div>
    <div class="brand">SaJocrest <span class="accent">Agrofarm</span></div>
  </div>

  <iframe id="appFrame"></iframe>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby_yNQZgUF4ID6ZVVWFEbvKzFCOiM-6L8UREb6qgHX6DwLQPsxoCYovfsCOpaV22k3ODA/exec";
    
    // 1. Detect if the user is on an iPhone/iPad
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;

    function init() {
      const frame = document.getElementById('appFrame');
      const loader = document.getElementById('wrapper-loader');

      if (isIOS) {
        // --- IPHONE LOGIC: REDIRECT ---
        // Necessary because frames block login cookies on iOS
        setTimeout(() => {
          window.location.replace(SCRIPT_URL);
        }, 2000);
      } else {
        // --- ANDROID/OTHER LOGIC: IFRAME ---
        // Keeps the gradient, hides the G, and stays "Zero-Flash"
        frame.src = SCRIPT_URL;
        frame.onload = function() {
          setTimeout(() => {
            loader.style.opacity = '0';
            frame.classList.add('active');
            setTimeout(() => { loader.style.display = 'none'; }, 800);
          }, 1000);
        };
      }
    }

    init();
  </script>
</body>
</html>
